<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YEDO | DAILY ARCHIVE</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        :root {
            --font-main: "Helvetica Neue", Helvetica, "Pretendard", Arial, sans-serif;
            --bg-color: #f4f4f5; 
            --accent-color: #000000;
            --text-muted: #888888;
            --grain-opacity: 0.04;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: var(--font-main);
            background-color: var(--bg-color);
            color: var(--accent-color);
            overflow: hidden; 
            -webkit-font-smoothing: antialiased;
            user-select: none;
            -webkit-user-select: none;
        }

        /* --- 1. HUD & Overlay --- */
        .noise-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 9999;
            background: url('data:image/svg+xml;base64,PHN2ZyB2aWV3Qm94PScwIDAgMjAwIDIwMCcgeG1sbnM9J2h0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnJz48ZmlsdGVyIGlkPSdub2lzZSc+PGZlVHVyYnVsZW5jZSB0eXBlPSdmcmFjdGFsTm9pc2UnIGJhc2VGcmVxdWVuY3k9JzAuNjUnIG51bU9jdGF2ZXM9JzMnIHN0aWNoVGlsc2U9J3N0aWNoJy8+PC9maWx0ZXI+PHJlY3Qgd2lkdGg9JzEwMCUnIGhlaWdodD0nMTAwJScgZmlsdGVyPSd1cmwoI25vaXNlKScvPjwvc3ZnPg==');
            opacity: var(--grain-opacity);
            filter: invert(1);
        }

        .hud {
            position: fixed; font-weight: 400; text-transform: uppercase; 
            letter-spacing: 2px; z-index: 900; pointer-events: none;
            color: #000; font-size: 12px; 
        }
        .hud-bottom-left { bottom: 40px; left: 40px; line-height: 1.5; }
        
        .hud-instruction {
            position: fixed; bottom: 40px; right: 40px; text-align: right;
            font-size: 10px; letter-spacing: 2px; color: var(--text-muted);
            text-transform: uppercase; z-index: 900; pointer-events: none;
            animation: hideInstruction 0.5s ease-in-out 10s forwards;
        }

        @keyframes hideInstruction {
            0% { opacity: 1; visibility: visible; }
            100% { opacity: 0; visibility: hidden; }
        }

        /* --- 2. Header & 트리거 --- */
        header {
            position: fixed; top: 0; left: 0; width: 100%;
            display: flex; justify-content: center; align-items: center;
            padding: 40px; box-sizing: border-box; z-index: 1001; pointer-events: none;
        }
        .logo a { font-size: 1.5rem; font-weight: 500; text-decoration: none; letter-spacing: 3px; pointer-events: auto; color: #000; }

        .menu-trigger { 
            position: fixed; right: 40px; top: 40px; z-index: 1005; 
            cursor: pointer; color: #000; width: 24px; height: 24px;
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.4s ease;
        }
        .menu-trigger svg {
            width: 100%; height: 100%; stroke-width: 1.2px;
        }
        .menu-trigger.active { transform: rotate(90deg); }

        /* --- 🌟 3. 캐스케이딩 텍스트 트리 메뉴 (최신 동기화) --- */
        #text-tree-menu {
            position: fixed; inset: 0;
            z-index: 1000; pointer-events: none;
        }

        .tree-backdrop {
            position: absolute; inset: 0;
            background: transparent;
            backdrop-filter: none;
            opacity: 0; pointer-events: none;
        }
        body.menu-open .tree-backdrop { opacity: 1; pointer-events: auto; cursor: default; }

        .tree-container {
            position: absolute;
            top: 80px; right: 40px; 
            display: flex; flex-direction: column; gap: 25px;
            align-items: flex-end; text-align: right;
        }

        .tree-branch {
            display: flex; flex-direction: column; align-items: flex-end;
            opacity: 0; transform: translateX(15px);
            transition: opacity 0.4s ease, transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: none;
        }
        
        body.menu-open .tree-branch { opacity: 1; transform: translateX(0); pointer-events: auto; }
        body.menu-open #branch-archive { transition-delay: 0.1s; } 

        .branch-title {
            font-size: 1.2rem; font-weight: 500; letter-spacing: 2px;
            text-transform: uppercase; color: #888;
            cursor: pointer; display: inline-block;
            transition: color 0.3s ease, transform 0.3s ease;
            transform-origin: right center; 
        }
        .branch-title:hover { color: #000; }
        .tree-branch.is-open .branch-title { color: #000; }

        .branch-leaves {
            display: flex; flex-direction: column; gap: 10px;
            margin-right: 10px; align-items: flex-end; 
            overflow: hidden; 
            max-height: 0; opacity: 0;
            transition: max-height 0.4s cubic-bezier(0.23, 1, 0.32, 1), opacity 0.3s ease, margin-top 0.3s ease;
        }

        .tree-branch.is-open .branch-leaves {
            max-height: 400px; opacity: 1; margin-top: 15px;
        }

        .branch-leaves a {
            font-size: 0.8rem; font-weight: 500; letter-spacing: 1px;
            color: #666; text-decoration: none; text-transform: uppercase;
            display: inline-block; transform: translateX(10px);
            opacity: 0; transition: all 0.3s ease;
        }

        .tree-branch.is-open .branch-leaves a { transform: translateX(0); opacity: 1; }
        .branch-leaves a:hover { color: #000; transform: translateX(-5px); }

        .tree-branch.is-open .branch-leaves a:nth-child(1) { transition-delay: 0.05s; }
        .tree-branch.is-open .branch-leaves a:nth-child(2) { transition-delay: 0.08s; }
        .tree-branch.is-open .branch-leaves a:nth-child(3) { transition-delay: 0.11s; }
        .tree-branch.is-open .branch-leaves a:nth-child(4) { transition-delay: 0.14s; }
        .tree-branch.is-open .branch-leaves a:nth-child(5) { transition-delay: 0.17s; }
        .tree-branch.is-open .branch-leaves a:nth-child(6) { transition-delay: 0.2s; }


        /* --- 4. 무한 캔버스 (Infinite Canvas) 레이아웃 --- */
        #viewport {
            width: 100vw; height: 100vh; position: relative;
            cursor: grab; overflow: hidden;
        }
        #viewport.is-dragging { cursor: grabbing; }

        #canvas-space {
            width: 6000px; height: 6000px; position: absolute;
            left: -3000px; top: -3000px; will-change: transform;
        }

        .photo-piece {
            position: absolute;
            transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1), filter 0.4s ease, box-shadow 0.4s ease;
            pointer-events: auto; cursor: pointer; transform-origin: center;
        }

        .photo-piece img {
            display: block; width: 100%; height: auto; max-width: 180px; 
            pointer-events: none; filter: grayscale(15%) contrast(1.05);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            transition: filter 0.3s ease, box-shadow 0.3s ease;
        }

        body:not(.menu-open) #viewport:not(.is-dragging) .photo-piece:hover {
            transform: translate(-50%, -50%) scale(1.05) rotate(var(--orig-rot)) !important;
            z-index: 100 !important;
        }
        
        body:not(.menu-open) #viewport:not(.is-dragging) .photo-piece:hover img {
            filter: grayscale(0%) contrast(1.05);
            box-shadow: 0 15px 35px rgba(0,0,0,0.25);
        }

        /* --- 5. Lightbox --- */
        #lightbox {
            position: fixed; inset: 0; background: rgba(244, 244, 245, 0.85); backdrop-filter: blur(8px);
            z-index: 10000; display: flex; flex-direction: column; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: opacity 0.4s ease; 
        }
        #lightbox.active { opacity: 1; pointer-events: auto; }
        
        .lightbox-slider { position: relative; width: 100%; height: 100vh; display: flex; align-items: center; justify-content: center; }
        
        /* 🌟 라이트박스 이미지 크기 상향 조정 (45vw -> 65vw) */
        .lightbox-slider img { max-width: 65vw; max-height: 65vh; object-fit: contain; display: none; box-shadow: 0 30px 60px rgba(0,0,0,0.1); }
        .lightbox-slider img.active { display: block; animation: fadeIn 0.4s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        @media (max-width: 768px) {
            header { padding: 30px 20px; }
            .logo a { font-size: 1.2rem; }
            .menu-trigger { right: 20px; top: 30px; }
            .hud-bottom-left { bottom: 30px; left: 20px; font-size: 10px; }
            .hud-instruction { right: 20px; bottom: 30px; font-size: 8px; }
            
            .tree-container { top: 70px; right: 20px; } 
            .branch-title { font-size: 1.1rem; }
            .branch-leaves a { font-size: 0.75rem; }

            .photo-piece img { max-width: 130px; } 
            
            /* 🌟 모바일 환경 라이트박스 이미지 크기 상향 조정 */
            .lightbox-slider img { max-width: 85vw; max-height: 70vh; }
        }
    </style>
</head>
<body>

    <div class="noise-overlay"></div>
    <div class="hud hud-bottom-left">DAILY ARCHIVE</div>
    <div class="hud-instruction">SCROLL OR DRAG TO EXPLORE</div>

    <header>
        <div class="logo"><a href="index.html">YEDO</a></div>
    </header>

    <div class="menu-trigger" onclick="toggleMenu()" id="menuBtn">
        <svg id="icon-hamburger" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="square" stroke-linejoin="miter">
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="5" x2="21" y2="5"></line>
            <line x1="3" y1="19" x2="21" y2="19"></line>
        </svg>
        <svg id="icon-close" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="square" stroke-linejoin="miter" style="display: none;">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
    </div>

    <!-- 🌟 최신 메뉴 시스템 및 스페이서 적용 -->
    <nav id="text-tree-menu">
        <div class="tree-backdrop" onclick="toggleMenu()"></div>
        
        <div class="tree-container">
            <!-- PHOTO Branch -->
            <div class="tree-branch" id="branch-photo">
                <div class="branch-title" onclick="toggleCategory('photo')">PHOTO</div>
                <div class="branch-leaves">
                    <a href="hongkong.html">HONG KONG</a>
                    <a href="shanghai.html">SHANGHAI</a>
                    <a href="tokyo.html">TOKYO</a>
                    <a href="hanoi.html">HANOI</a>
                    <a href="sapa.html">SAPA</a>
                    <a href="danang.html">DA NANG</a>
                    <!-- 좌측 6번째 항목 -->
                    <a href="hochiminh.html">HO CHI MINH</a>
                </div>
            </div>
            
            <!-- ARCHIVE Branch -->
            <div class="tree-branch" id="branch-archive">
                <div class="branch-title" onclick="toggleCategory('archive')">ARCHIVE</div>
                <div class="branch-leaves">
                    <a href="music.html">MUSIC</a>
                    <a href="clothing.html">CLOTHING</a>
                    <a href="dailyarchive.html">DAILY ARCHIVE</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- 무한 캔버스 영역 -->
    <div id="viewport">
        <div id="canvas-space">
            <!-- 자바스크립트를 통해 사진들이 충돌 없이 무작위 배치됩니다 -->
        </div>
    </div>

    <!-- Lightbox -->
    <div id="lightbox" onclick="closeLightboxOutside(event)">
        <div class="lightbox-slider" id="lightbox-slider"></div>
    </div>

    <script>
        function toggleMenu() {
            const btn = document.getElementById('menuBtn');
            const iconHamburger = document.getElementById('icon-hamburger');
            const iconClose = document.getElementById('icon-close');
            
            document.body.classList.toggle('menu-open');
            btn.classList.toggle('active');
            
            if(!document.body.classList.contains('menu-open')) {
                document.getElementById('branch-photo').classList.remove('is-open');
                document.getElementById('branch-archive').classList.remove('is-open');
                iconHamburger.style.display = 'block'; iconClose.style.display = 'none';
            } else {
                iconHamburger.style.display = 'none'; iconClose.style.display = 'block';
            }
        }

        function toggleCategory(cat) {
            const photoBranch = document.getElementById('branch-photo');
            const archiveBranch = document.getElementById('branch-archive');

            if (cat === 'photo') {
                photoBranch.classList.toggle('is-open');
                archiveBranch.classList.remove('is-open'); 
            } else {
                archiveBranch.classList.toggle('is-open');
                photoBranch.classList.remove('is-open'); 
            }
        }

        // --- 🌟 데이터 통합 (20장의 데일리 사진 데이터 유지) ---
        const photoData = Array.from({ length: 25 }, (_, i) => ({
            src: `dailyimg/daily${i + 1}.webp`,
            title: `Daily Record ${String(i + 1).padStart(2, '0')}`
        }));

        // --- 캔버스 패닝 (드래그 및 트랙패드 스크롤) 로직 ---
        const viewport = document.getElementById('viewport');
        const canvasSpace = document.getElementById('canvas-space');
        
        let isMouseDown = false;
        let isDragging = false;
        let dragStartX, dragStartY;
        let startX, startY;
        let currentX = window.innerWidth / 2;
        let currentY = window.innerHeight / 2; 
        
        canvasSpace.style.transform = `translate(${currentX}px, ${currentY}px)`;

        function startDrag(clientX, clientY) {
            if (document.body.classList.contains('menu-open')) return; 

            isMouseDown = true;
            isDragging = false; 
            dragStartX = clientX;
            dragStartY = clientY;
            
            startX = clientX - currentX;
            startY = clientY - currentY;
        }

        function doDrag(clientX, clientY) {
            if (!isMouseDown) return;
            
            if (Math.hypot(clientX - dragStartX, clientY - dragStartY) > 5) {
                if (!isDragging) {
                    isDragging = true;
                    viewport.classList.add('is-dragging');
                }
            }
            
            if (!isDragging) return;

            currentX = clientX - startX;
            currentY = clientY - startY;
            canvasSpace.style.transform = `translate(${currentX}px, ${currentY}px)`;
        }

        function endDrag() {
            isMouseDown = false;
            setTimeout(() => {
                isDragging = false;
                viewport.classList.remove('is-dragging');
            }, 50);
        }

        viewport.addEventListener('mousedown', (e) => startDrag(e.clientX, e.clientY));
        window.addEventListener('mousemove', (e) => doDrag(e.clientX, e.clientY));
        window.addEventListener('mouseup', endDrag);

        viewport.addEventListener('touchstart', (e) => startDrag(e.touches[0].clientX, e.touches[0].clientY), { passive: false });
        window.addEventListener('touchmove', (e) => {
            if (isDragging) e.preventDefault(); 
            doDrag(e.touches[0].clientX, e.touches[0].clientY);
        }, { passive: false });
        window.addEventListener('touchend', endDrag);

        viewport.addEventListener('wheel', (e) => {
            if (document.body.classList.contains('menu-open')) return;
            e.preventDefault(); 
            currentX -= e.deltaX;
            currentY -= e.deltaY;
            canvasSpace.style.transform = `translate(${currentX}px, ${currentY}px)`;
        }, { passive: false });


        // --- 완벽한 겹침 방지 (Collision Detection Algorithm) ---
        function scatterPhotos() {
            const isMobile = window.innerWidth < 768;
            const canvasCenter = 3000;
            const spreadRadius = isMobile ? 500 : 800; 
            const minDistance = isMobile ? 140 : 200; 
            
            const placedPhotos = [];
            const shuffledData = [...photoData].sort(() => Math.random() - 0.5);

            shuffledData.forEach((data) => {
                let attempts = 0;
                let finalX = canvasCenter;
                let finalY = canvasCenter;
                let hasCollision = true;

                while (hasCollision && attempts < 200) {
                    const angle = Math.random() * Math.PI * 2;
                    const r = Math.sqrt(Math.random()) * spreadRadius; 
                    
                    finalX = canvasCenter + Math.cos(angle) * r;
                    finalY = canvasCenter + Math.sin(angle) * r;

                    hasCollision = placedPhotos.some(p => {
                        const dist = Math.hypot(p.x - finalX, p.y - finalY);
                        return dist < minDistance; 
                    });
                    
                    attempts++;
                }

                placedPhotos.push({ x: finalX, y: finalY });

                const rot = (Math.random() - 0.5) * 24;

                const el = document.createElement('div');
                el.className = 'photo-piece';
                
                el.style.left = `${finalX}px`;
                el.style.top = `${finalY}px`;
                el.style.transform = `translate(-50%, -50%) rotate(${rot}deg)`;
                
                el.style.setProperty('--orig-rot', `${rot}deg`);
                el.style.zIndex = Math.floor(Math.random() * 20);

                el.innerHTML = `<img src="${data.src}" alt="${data.title}">`;

                el.addEventListener('click', (e) => {
                    if (!isDragging && !document.body.classList.contains('menu-open')) {
                        openLightbox(data.src);
                    }
                });

                canvasSpace.appendChild(el);
            });
        }

        window.addEventListener('DOMContentLoaded', scatterPhotos);

        // --- Lightbox 제어 ---
        function openLightbox(src) {
            const slider = document.getElementById('lightbox-slider');
            slider.innerHTML = `<img src="${src}" class="active" alt="">`;
            document.getElementById('lightbox').classList.add('active');
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
        }

        function closeLightboxOutside(e) {
            if (e.target.id === 'lightbox' || e.target.classList.contains('lightbox-slider')) {
                closeLightbox();
            }
        }

        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                if (document.getElementById('lightbox').classList.contains('active')) closeLightbox();
                if (document.body.classList.contains('menu-open')) toggleMenu();
            }
        });
    </script>
</body>
</html>
